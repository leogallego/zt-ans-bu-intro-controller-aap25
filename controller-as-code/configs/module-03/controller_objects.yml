---
# Module 03: Creating an Inventory
# Creates: Lab-Inventory, hosts (node1, node2), group (web)
#
# Variables use wildcard suffix (_module03) so dispatch can merge
# them with variables from other modules when loaded cumulatively.

controller_inventories_module03:
  - name: Lab-Inventory
    organization: Default

controller_hosts_module03:
  - name: node1
    inventory: Lab-Inventory
    state: present
  - name: node2
    inventory: Lab-Inventory
    state: present

controller_groups_module03:
  - name: web
    inventory: Lab-Inventory
    hosts:
      - node1
      - node2
