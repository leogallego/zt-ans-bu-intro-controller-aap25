---
# Full Controller as Code playbook
# Applies ALL workshop objects at once using infra.aap_configuration.dispatch
#
# Usage:
#   ansible-playbook configure_controller.yml
#
# Apply only specific object types with tags:
#   ansible-playbook configure_controller.yml --tags credentials,projects
#
# Available tags: credentials, credential_types, inventories, hosts,
#   host_groups, projects, job_templates, workflow_job_templates
#
- name: Configure Automation Controller - Full Workshop Setup
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - configs/auth.yml
  vars:
    # Merge all module configs into a single desired state
    controller_credentials:
      - name: lab-credentials
        credential_type: Machine
        organization: Default
        inputs:
          username: rhel
          password: ansible123!
          ssh_key_data: "{{ lookup('file', '/home/rhel/.ssh/id_rsa') }}"

    controller_inventories:
      - name: Lab-Inventory
        organization: Default

    controller_hosts:
      - name: node1
        inventory: Lab-Inventory
        state: present
      - name: node2
        inventory: Lab-Inventory
        state: present
      - name: node3
        inventory: Lab-Inventory
        state: present

    controller_groups:
      - name: web
        inventory: Lab-Inventory
        hosts:
          - node1
          - node2
      - name: database
        inventory: Lab-Inventory
        hosts:
          - node3

    controller_projects:
      - name: Apache playbooks
        organization: Default
        state: present
        scm_type: git
        scm_url: https://github.com/ansible-tmm/instruqt-wyfp.git
        wait: true
      - name: Additional playbooks
        organization: Default
        state: present
        scm_type: git
        scm_url: https://github.com/ansible-tmm/instruqt-wyfp-additional.git
        wait: true

    controller_templates:
      - name: Install Apache
        organization: Default
        state: present
        inventory: Lab-Inventory
        become_enabled: true
        playbook: apache.yml
        project: Apache playbooks
        credential: lab-credentials
      - name: Extended services
        organization: Default
        state: present
        inventory: Lab-Inventory
        become_enabled: true
        playbook: extended_services.yml
        project: Additional playbooks
        credential: lab-credentials
      - name: Set motd
        organization: Default
        state: present
        inventory: Lab-Inventory
        become_enabled: true
        playbook: motd_facts.yml
        project: Additional playbooks
        credential: lab-credentials
      - name: Install Apache with Survey
        organization: Default
        state: present
        inventory: Lab-Inventory
        become_enabled: true
        playbook: apache_template.yml
        project: Apache playbooks
        credential: lab-credentials
        survey_enabled: true
        survey_spec:
          name: Apache Survey
          description: Survey for Apache template deployment
          spec:
            - question_name: "What is your name, fellow student?"
              question_description: >-
                Enter your name or nickname to see it work!
              variable: student_name
              type: text
              required: false
              default: Skippy

    controller_workflows:
      - name: Your first workflow
        description: Create a Workflow from previous Job Templates
        organization: Default
        inventory: Lab-Inventory
        simplified_workflow_nodes:
          - identifier: apache101
            unified_job_template: Install Apache
            success_nodes:
              - extended201
              - motd201
          - identifier: extended201
            unified_job_template: Extended services
          - identifier: motd201
            unified_job_template: Set motd

  tasks:
    - name: Apply all Controller configuration via dispatch
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
